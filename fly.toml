app = "dungeon-dry-tree"
primary_region = "arn"

[deploy]
strategy = "immediate"

[[services]]
internal_port = 8080
protocol = "tcp"
auto_stop_machines = "suspend"
auto_start_machines = true
min_machines_running = 0

[[services.ports]]
port = 80
handlers = ["tcp"]

[[services.ports]]
port = 443
handlers = ["tcp", "tls"]

[[vm]]
cpus = 1
memory = "512mb"
cpu_kind = "shared"
